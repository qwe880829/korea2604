<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Design</title>
    <style>
        body {
            background-color: #FAF6E9;
            font-family: Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }
        .section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            width: 80%;
            position: relative;
        }
        .section::before {
            content: "";
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 30px;
            background: linear-gradient(135deg, #C9E4DE, #E5D3B3);
            z-index: -1;
        }
        footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
        }
        nav {
            margin-top: 2rem;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Our Organic Travel Experience</h1>

        <div class="section">
            <h2>Day 1: Arrival</h2>
            <p>Details about Day 1 activities.</p>
        </div>

        <div class="section">
            <h2>Day 3: Exploration</h2>
            <p>Details about Day 3 activities.</p>
        </div>

        <div class="section">
            <h2>Day 6: Relaxation</h2>
            <p>Details about Day 6 activities.</p>
        </div>

        <nav>
            <a href="#day1">Day 1</a>
            <a href="#day3">Day 3</a>
            <a href="#day6">Day 6</a>
        </nav>
    </div>
    <footer>
        <p>&copy; 2026 Organic Travel</p>
    </footer>
</body>
</html>
